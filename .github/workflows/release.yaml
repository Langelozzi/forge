name: Build and Release Forge

on:
  push:
    tags:
      - 'v*' # Trigger only when you push a tag starting with 'v' (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: forge-linux
            asset_name: forge-linux
          - os: macos-latest
            artifact_name: forge
            asset_name: forge-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Strip binary (Unix)
        run: strip target/release/${{ matrix.artifact_name }}

      - name: Rename binary
        run: cp target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/forge-linux/forge-linux
            release-assets/forge-macos/forge-macos
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
